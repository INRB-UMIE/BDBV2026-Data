notes: |
  Filtered OSM health-facility points (excludes pharmacy, dentist, school amenity types and
  selected healthcare tags) intersected with 519 DRC health zones. data/healthsites_io/
  process.R exports processed/healthsites_io__healthsite_count__static.csv and
  processed/healthsites_io__healthsite_density__static.csv (nom with province suffix for
  Bili and Lubunga duplicates); writes raw/healthsites_raw_filtered.shp and three PNG maps.
  Upstream: raw/Democratic Republic of the Congo-node.shp. 2704 points after filter;
  342 zones with zero mapped sites. Not a complete MoH facility list—OSM coverage varies.
  See README.md for filters, regeneration, and limitations.
